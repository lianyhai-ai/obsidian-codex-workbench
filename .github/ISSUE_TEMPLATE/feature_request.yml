name: Feature request
description: Suggest an improvement or a new capability
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      placeholder: What workflow is currently hard, slow, or unclear?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: Describe the ideal interaction or behavior.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Chat UX
        - Local Codex integration
        - Learning mode
        - Context packs
        - Citations
        - Release / docs
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Any workarounds or alternative ideas
