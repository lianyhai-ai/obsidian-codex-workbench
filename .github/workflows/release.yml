name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Prepare release bundle
        run: npm run release:bundle

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/release/manifest.json
            build/release/main.js
            build/release/styles.css
            build/release/checksums-*.txt
          generate_release_notes: true
